<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EYE TRAINING</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #222222;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #title {
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 24px;
    }

    #score, #timer {
      position: absolute;
      top: 10px;
      font-size: 20px;
    }

    #score {
      right: 160px;
    }

    #timer {
      right: 20px;
    }

    #time-bar-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      height: 20px;
      background-color: #444;
      border-radius: 10px;
    }

    #time-bar {
      width: 100%;
      height: 100%;
      background-color: orange;
      border-radius: 10px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
    }

    #crosshair::before {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
    }

    #crosshair::after {
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }

    .target {
      position: absolute;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255,165,0,1) 0%, rgba(255,140,0,0.5) 50%, rgba(255,140,0,0) 70%);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255,165,0,0.7), 0 0 40px rgba(255,140,0,0.5);
      cursor: pointer;
    }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 32px;
      text-align: center;
      display: none;
    }

    #retry-button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background-color: orange;
      border: none;
      color: #222;
      cursor: pointer;
      border-radius: 8px;
    }

    #mode-buttons {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .mode-button {
      margin: 10px;
      padding: 10px 30px;
      font-size: 18px;
      background-color: orange;
      border: none;
      color: #222;
      cursor: pointer;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="title">EYE TRAINING</div>
  <div id="score">SCORE: 0</div>
  <div id="timer">TIME: 60</div>
  <div id="time-bar-container">
    <div id="time-bar"></div>
  </div>
  <div id="crosshair"></div>
  <div id="game-over">
    <div id="final-score"></div>
    <button id="retry-button">RETRY</button>
  </div>
  <div id="mode-buttons">
    <button class="mode-button" onclick="initGame(30)">30秒モード</button>
    <button class="mode-button" onclick="initGame(60)">60秒モード</button>
  </div>

  <script>
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const timeBar = document.getElementById('time-bar');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const retryButton = document.getElementById('retry-button');
    const modeButtons = document.getElementById('mode-buttons');

    let score = 0;
    let timeLeft = 60;
    let interval;
    let currentTarget = null;
    let maxTime = 60;

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnTarget() {
      if (currentTarget) return;

      const target = document.createElement('div');
      const size = 100;
      target.className = 'target';
      target.style.width = `${size}px`;
      target.style.height = `${size}px`;
      target.style.left = `${random(0, window.innerWidth - size)}px`;
      target.style.top = `${random(0, window.innerHeight - size)}px`;

      target.addEventListener('click', e => {
        e.stopPropagation();
        score++;
        scoreEl.textContent = `SCORE: ${score}`;
        target.remove();
        currentTarget = null;
        spawnTarget();
      });

      document.body.appendChild(target);
      currentTarget = target;
    }

    function initGame(time) {
      maxTime = time;
      modeButtons.style.display = 'none';
      startGame();
    }

    function startGame() {
      score = 0;
      timeLeft = maxTime;
      scoreEl.textContent = 'SCORE: 0';
      timerEl.textContent = `TIME: ${timeLeft}`;
      timeBar.style.width = '100%';
      gameOverEl.style.display = 'none';

      if (currentTarget) {
        currentTarget.remove();
        currentTarget = null;
      }

      spawnTarget();

      interval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = `TIME: ${timeLeft}`;
        timeBar.style.width = `${(timeLeft / maxTime) * 100}%`;

        if (timeLeft <= 0) {
          clearInterval(interval);
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      if (currentTarget) currentTarget.remove();
      currentTarget = null;
      finalScoreEl.textContent = `FINAL SCORE: ${score}`;
      gameOverEl.style.display = 'block';
    }

    retryButton.addEventListener('click', () => {
      modeButtons.style.display = 'block';
      gameOverEl.style.display = 'none';
    });
  </script>
</body>
</html>
